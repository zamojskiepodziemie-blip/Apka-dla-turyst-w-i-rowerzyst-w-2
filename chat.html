<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Czat — Szlaki Lubelszczyzny</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lora:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #1B5E3B;
  --primary-light: #40916C;
  --primary-lighter: #95D5B2;
  --primary-bg: rgba(27,94,59,0.06);
  --secondary: #0F3325;
  --accent: #E8913A;
  --bg: #F5F5F0;
  --bg-card: #FFFFFF;
  --text: #1B4332;
  --text-secondary: #555;
  --text-muted: #999;
  --border: #E0DDD5;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --transition: all 0.2s ease;
}
body {
  font-family: 'Lora', Georgia, serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
.chat-header {
  background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
  color: white;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.chat-header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 700;
  flex: 1;
}
.chat-header .back-btn {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.12);
  text-decoration: none; font-size: 14px; transition: var(--transition);
}
.chat-header .back-btn:hover { background: rgba(255,255,255,0.25); color: white; }
.chat-header .user-badge {
  font-size: 11px; color: rgba(255,255,255,0.7);
  max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* ── Layout ── */
.chat-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Sidebar ── */
.chat-sidebar {
  width: 260px;
  background: var(--bg-card);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.sidebar-section {
  padding: 12px 16px 8px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  font-weight: 700;
}
.channel-list { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
.channel-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; border-radius: var(--radius-sm);
  cursor: pointer; transition: var(--transition);
  font-size: 13px; color: var(--text-secondary);
  border: none; background: none; width: 100%; text-align: left;
  font-family: 'Lora', serif;
}
.channel-item:hover { background: var(--primary-bg); }
.channel-item.active { background: var(--primary-bg); color: var(--primary); font-weight: 600; }
.channel-item i { width: 18px; text-align: center; font-size: 12px; }
.channel-item .online-dot {
  width: 7px; height: 7px; border-radius: 50%; background: #4CAF50;
  margin-left: auto; flex-shrink: 0;
}
.channel-item .unread-badge {
  margin-left: auto; background: var(--accent); color: white;
  font-size: 10px; font-weight: 700; padding: 1px 6px;
  border-radius: 10px; min-width: 18px; text-align: center;
}
.sidebar-toggle {
  display: none; position: fixed; top: 60px; left: 8px; z-index: 100;
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--primary); color: white; border: none;
  font-size: 14px; cursor: pointer; box-shadow: var(--shadow);
}

/* ── Main chat area ── */
.chat-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.chat-channel-bar {
  padding: 10px 20px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.chat-channel-bar i { color: var(--primary); font-size: 13px; }

/* ── Messages ── */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.msg {
  max-width: 75%;
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.5;
  position: relative;
  word-wrap: break-word;
}
.msg.other {
  align-self: flex-start;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.msg.mine {
  align-self: flex-end;
  background: var(--primary);
  color: white;
  border-bottom-right-radius: 4px;
}
.msg-author {
  font-size: 11px;
  font-weight: 700;
  margin-bottom: 2px;
  color: var(--primary);
}
.msg.mine .msg-author { color: rgba(255,255,255,0.7); }
.msg-time {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 4px;
  text-align: right;
}
.msg.mine .msg-time { color: rgba(255,255,255,0.6); }
.msg-date-sep {
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  padding: 12px 0 4px;
}
.typing-indicator {
  font-size: 12px;
  color: var(--text-muted);
  padding: 4px 20px;
  height: 24px;
  flex-shrink: 0;
  font-style: italic;
}

/* ── Input bar ── */
.chat-input-bar {
  padding: 12px 20px;
  background: var(--bg-card);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: flex-end;
  flex-shrink: 0;
}
.chat-input-bar textarea {
  flex: 1;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'Lora', serif;
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
  resize: none;
  outline: none;
  max-height: 100px;
  min-height: 40px;
  line-height: 1.4;
  transition: border-color 0.2s;
}
.chat-input-bar textarea:focus { border-color: var(--primary-light); box-shadow: 0 0 0 3px rgba(27,94,59,0.1); }
.chat-input-bar .send-btn {
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--primary); color: white; border: none;
  cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: var(--transition); flex-shrink: 0;
}
.chat-input-bar .send-btn:hover { background: var(--primary-light); }
.chat-input-bar .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.char-count {
  font-size: 10px; color: var(--text-muted);
  position: absolute; right: 76px; bottom: 16px;
}
.char-count.warn { color: var(--accent); }
.char-count.over { color: #E53935; }

/* ── Empty state ── */
.empty-chat {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--text-muted); gap: 8px;
}
.empty-chat i { font-size: 40px; opacity: 0.3; }
.empty-chat p { font-size: 14px; }

/* ── Mobile ── */
@media (max-width: 768px) {
  .chat-sidebar {
    position: fixed; left: -280px; top: 0; bottom: 0;
    z-index: 99; width: 260px;
    box-shadow: 4px 0 20px rgba(0,0,0,0.15);
    transition: left 0.3s ease;
  }
  .chat-sidebar.open { left: 0; }
  .sidebar-toggle { display: flex; align-items: center; justify-content: center; }
  .msg { max-width: 88%; }
  .chat-input-bar { padding: 8px 12px; }
  .chat-messages { padding: 12px; }
  .chat-channel-bar { padding: 10px 12px; font-size: 13px; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="chat-header">
  <a href="/" class="back-btn" title="Powrót"><i class="fas fa-arrow-left"></i></a>
  <h1><i class="fas fa-comments" style="margin-right:6px;font-size:16px;"></i>Czat</h1>
  <span class="user-badge" id="userBadge"></span>
</div>

<!-- Layout -->
<div class="chat-layout">

  <!-- Sidebar toggle (mobile) -->
  <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-users"></i></button>

  <!-- Sidebar -->
  <div class="chat-sidebar" id="chatSidebar">
    <div class="sidebar-section">Kanały</div>
    <div class="channel-list">
      <button class="channel-item active" id="channelPublic" data-channel="public">
        <i class="fas fa-globe"></i> Czat ogólny
      </button>
    </div>
    <div class="sidebar-section">Użytkownicy online</div>
    <div class="channel-list" id="onlineList"></div>
    <div class="sidebar-section">Wszyscy użytkownicy</div>
    <div class="channel-list" id="allUsersList"></div>
  </div>

  <!-- Main -->
  <div class="chat-main">
    <div class="chat-channel-bar" id="channelBar">
      <i class="fas fa-globe"></i> <span id="channelName">Czat ogólny</span>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="empty-chat" id="emptyState">
        <i class="fas fa-comments"></i>
        <p>Brak wiadomości. Napisz coś!</p>
      </div>
    </div>
    <div class="typing-indicator" id="typingIndicator"></div>
    <div class="chat-input-bar" style="position:relative;">
      <textarea id="msgInput" placeholder="Napisz wiadomość..." rows="1" maxlength="500"></textarea>
      <span class="char-count" id="charCount"></span>
      <button class="send-btn" id="sendBtn" title="Wyślij"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/auth.js"></script>
<script>
(async function() {
  // ── Auth guard ──
  await AuthService.init();
  const user = await AuthService.getUser();
  if (!user) {
    window.location.href = '/login.html?redirect=' + encodeURIComponent('/chat.html');
    return;
  }
  document.getElementById('userBadge').textContent = user.email;

  const myId = user.id;
  const myEmail = user.email;

  // ── State ──
  let currentChannel = 'public'; // 'public' lub number (userId)
  let privateUnread = {}; // userId → count
  const privateHistoryLoaded = {};

  // ── Socket.io ──
  const socket = io({
    auth: { token: AuthService.getAccessToken() }
  });

  socket.on('connect_error', async (err) => {
    // Token mógł wygasnąć — spróbuj odświeżyć
    const result = await AuthService.refresh();
    if (result) {
      socket.auth.token = AuthService.getAccessToken();
      socket.connect();
    } else {
      window.location.href = '/login.html?redirect=' + encodeURIComponent('/chat.html');
    }
  });

  // ── DOM ──
  const messagesDiv = document.getElementById('chatMessages');
  const msgInput = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');
  const emptyState = document.getElementById('emptyState');
  const typingDiv = document.getElementById('typingIndicator');
  const charCount = document.getElementById('charCount');
  const channelBar = document.getElementById('channelBar');
  const channelName = document.getElementById('channelName');
  const onlineListDiv = document.getElementById('onlineList');
  const allUsersDiv = document.getElementById('allUsersList');
  const sidebar = document.getElementById('chatSidebar');
  const sidebarToggle = document.getElementById('sidebarToggle');
  const channelPublicBtn = document.getElementById('channelPublic');

  // ── Load messages ──
  async function loadPublicHistory() {
    try {
      const res = await fetch('/api/chat/messages', {
        headers: { Authorization: `Bearer ${AuthService.getAccessToken()}` }
      });
      if (!res.ok) return;
      const msgs = await res.json();
      if (currentChannel === 'public') {
        clearMessages();
        msgs.forEach(m => appendMessage(m));
        scrollBottom();
      }
    } catch(e) {}
  }

  async function loadPrivateHistory(userId) {
    if (privateHistoryLoaded[userId]) return;
    try {
      const res = await fetch(`/api/chat/messages/private/${userId}`, {
        headers: { Authorization: `Bearer ${AuthService.getAccessToken()}` }
      });
      if (!res.ok) return;
      const msgs = await res.json();
      privateHistoryLoaded[userId] = true;
      if (currentChannel === userId) {
        clearMessages();
        msgs.forEach(m => appendMessage(m));
        scrollBottom();
      }
    } catch(e) {}
  }

  async function loadAllUsers() {
    try {
      const res = await fetch('/api/chat/users', {
        headers: { Authorization: `Bearer ${AuthService.getAccessToken()}` }
      });
      if (!res.ok) return;
      const users = await res.json();
      renderAllUsers(users);
    } catch(e) {}
  }

  // ── Render ──
  function clearMessages() {
    messagesDiv.innerHTML = '';
  }

  function formatTime(iso) {
    const d = new Date(iso + 'Z');
    return d.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' });
  }

  function formatDate(iso) {
    const d = new Date(iso + 'Z');
    return d.toLocaleDateString('pl-PL', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  let lastDate = '';

  function appendMessage(msg) {
    emptyState.style.display = 'none';

    const msgDate = formatDate(msg.created_at);
    if (msgDate !== lastDate) {
      lastDate = msgDate;
      const sep = document.createElement('div');
      sep.className = 'msg-date-sep';
      sep.textContent = msgDate;
      messagesDiv.appendChild(sep);
    }

    const div = document.createElement('div');
    const isMine = msg.user_id === myId;
    div.className = `msg ${isMine ? 'mine' : 'other'}`;

    const authorName = msg.user_email ? msg.user_email.split('@')[0] : 'Anonim';
    div.innerHTML = `
      <div class="msg-author">${isMine ? 'Ty' : escapeHtml(authorName)}</div>
      <div class="msg-text">${escapeHtml(msg.content)}</div>
      <div class="msg-time">${formatTime(msg.created_at)}</div>
    `;
    messagesDiv.appendChild(div);
  }

  function scrollBottom() {
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // ── Channel switching ──
  function switchChannel(channel) {
    currentChannel = channel;
    lastDate = '';
    clearMessages();
    emptyState.style.display = '';
    emptyState.querySelector('p').textContent = 'Brak wiadomości. Napisz coś!';

    // Update sidebar active
    document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));

    if (channel === 'public') {
      channelBar.innerHTML = '<i class="fas fa-globe"></i> <span>Czat ogólny</span>';
      channelPublicBtn.classList.add('active');
      loadPublicHistory();
    } else {
      const btn = document.querySelector(`.channel-item[data-user-id="${channel}"]`);
      if (btn) {
        btn.classList.add('active');
        const badge = btn.querySelector('.unread-badge');
        if (badge) badge.remove();
        delete privateUnread[channel];
      }
      const email = btn ? btn.dataset.email : `Użytkownik #${channel}`;
      const name = email.split('@')[0];
      channelBar.innerHTML = `<i class="fas fa-lock"></i> <span>${escapeHtml(name)}</span>`;
      loadPrivateHistory(channel);
    }

    // Close sidebar on mobile
    sidebar.classList.remove('open');
    msgInput.focus();
  }

  channelPublicBtn.addEventListener('click', () => switchChannel('public'));

  // ── Online users ──
  function renderOnlineUsers(users) {
    onlineListDiv.innerHTML = '';
    users.forEach(u => {
      if (u.id === myId) return;
      const btn = document.createElement('button');
      btn.className = 'channel-item';
      btn.dataset.userId = u.id;
      btn.dataset.email = u.email;
      if (currentChannel === u.id) btn.classList.add('active');
      const name = u.email.split('@')[0];
      btn.innerHTML = `<i class="fas fa-user"></i> ${escapeHtml(name)} <span class="online-dot"></span>`;
      if (privateUnread[u.id]) {
        btn.innerHTML += `<span class="unread-badge">${privateUnread[u.id]}</span>`;
      }
      btn.addEventListener('click', () => switchChannel(u.id));
      onlineListDiv.appendChild(btn);
    });
  }

  function renderAllUsers(users) {
    allUsersDiv.innerHTML = '';
    users.forEach(u => {
      const btn = document.createElement('button');
      btn.className = 'channel-item';
      btn.dataset.userId = u.id;
      btn.dataset.email = u.email;
      if (currentChannel === u.id) btn.classList.add('active');
      const name = u.email.split('@')[0];
      btn.innerHTML = `<i class="fas fa-user" style="opacity:0.4"></i> ${escapeHtml(name)}`;
      if (privateUnread[u.id]) {
        btn.innerHTML += `<span class="unread-badge">${privateUnread[u.id]}</span>`;
      }
      btn.addEventListener('click', () => switchChannel(u.id));
      allUsersDiv.appendChild(btn);
    });
  }

  // ── Socket events ──
  socket.on('message:public', (msg) => {
    if (currentChannel === 'public') {
      appendMessage(msg);
      scrollBottom();
    }
  });

  socket.on('message:private', (msg) => {
    const otherId = msg.user_id === myId ? msg.recipient_id : msg.user_id;
    if (currentChannel === otherId) {
      appendMessage(msg);
      scrollBottom();
    } else {
      // Unread badge
      privateUnread[otherId] = (privateUnread[otherId] || 0) + 1;
      const btn = document.querySelector(`.channel-item[data-user-id="${otherId}"]`);
      if (btn) {
        let badge = btn.querySelector('.unread-badge');
        if (!badge) {
          badge = document.createElement('span');
          badge.className = 'unread-badge';
          btn.appendChild(badge);
        }
        badge.textContent = privateUnread[otherId];
      }
    }
  });

  socket.on('users:online', (users) => {
    renderOnlineUsers(users);
  });

  // ── Typing ──
  let typingTimeout = null;
  socket.on('typing', (data) => {
    if (data.userId === myId) return;
    const name = data.email.split('@')[0];
    typingDiv.textContent = `${name} pisze...`;
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => { typingDiv.textContent = ''; }, 2000);
  });

  // ── Send message ──
  function sendMessage() {
    const content = msgInput.value.trim();
    if (!content || content.length > 500) return;

    if (currentChannel === 'public') {
      socket.emit('message:public', { content });
    } else {
      socket.emit('message:private', { content, recipientId: currentChannel });
    }

    msgInput.value = '';
    charCount.textContent = '';
    autoResize();
  }

  sendBtn.addEventListener('click', sendMessage);

  msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Typing indicator emit
  let lastTypingEmit = 0;
  msgInput.addEventListener('input', () => {
    autoResize();
    // Char count
    const len = msgInput.value.length;
    if (len > 400) {
      charCount.textContent = `${len}/500`;
      charCount.className = len >= 500 ? 'char-count over' : 'char-count warn';
    } else {
      charCount.textContent = '';
    }
    // Typing
    const now = Date.now();
    if (now - lastTypingEmit > 1500) {
      lastTypingEmit = now;
      socket.emit('typing', currentChannel === 'public' ? {} : { recipientId: currentChannel });
    }
  });

  function autoResize() {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 100) + 'px';
  }

  // ── Sidebar mobile toggle ──
  sidebarToggle.addEventListener('click', () => {
    sidebar.classList.toggle('open');
  });
  document.addEventListener('click', (e) => {
    if (window.innerWidth <= 768 && sidebar.classList.contains('open') &&
        !sidebar.contains(e.target) && e.target !== sidebarToggle) {
      sidebar.classList.remove('open');
    }
  });

  // ── Init ──
  loadPublicHistory();
  loadAllUsers();
})();
</script>
</body>
</html>
